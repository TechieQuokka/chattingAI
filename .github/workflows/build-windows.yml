name: Build Windows

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Build chat-server sidecar
        run: |
          cargo build --release -p chat-server
          mkdir -p src-tauri/binaries
          cp target/release/chat-server.exe src-tauri/binaries/chat-server-x86_64-pc-windows-msvc.exe
        shell: bash

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Show build output
        run: find src-tauri/target/release -name "*.exe" -o -name "*.msi" 2>/dev/null | head -20
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-chat-windows
          path: src-tauri/target/release/bundle/
